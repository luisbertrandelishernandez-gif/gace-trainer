<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GACE Trainer</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ðŸ“</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GACE Trainer">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0}body{font-family:'DM Sans',sans-serif;background:#f8f7f4;color:#1e293b}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,Cell}=Recharts;
const C={bg:"#f8f7f4",card:"#ffffff",header:"#1e293b",accent:"#b45309",accentLight:"#fef3c7",success:"#059669",successLight:"#d1fae5",error:"#dc2626",errorLight:"#fee2e2",muted:"#64748b",border:"#e2e0db",text:"#1e293b",textLight:"#475569",marked:"#7c3aed",markedLight:"#ede9fe",unanswered:"#d1d5db"};
const TC=["#2563eb","#7c3aed","#db2777","#ea580c","#059669","#0891b2","#4f46e5","#b45309","#6366f1"];
const IC={clock:"\u23F1",check:"\u2713",x:"\u2717",minus:"\u2014",flag:"\u2691",left:"\u25C0",right:"\u25B6",play:"\u25B6",book:"\uD83D\uDCD6",list:"\u2630",back:"\u2190",warn:"\u26A0",file:"\uD83D\uDCC4"};
const DIAS=["Domingo","Lunes","Martes","Mi\u00e9rcoles","Jueves","Viernes","S\u00e1bado"];
const formatTime=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+":"+String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0"):m+":"+String(sc).padStart(2,"0");};
const formatDate=d=>{const p=d.split("-");const dt=new Date(+p[0],+p[1]-1,+p[2]);return DIAS[dt.getDay()]+" "+p[2]+"/"+p[1]+"/"+p[0];};

function flattenQuestions(sim){
  const qs=[];
  if(sim&&sim.parte_test&&sim.parte_test.bloques){sim.parte_test.bloques.forEach(function(b){(b.preguntas||[]).forEach(function(p){qs.push(Object.assign({},p,{section:"test",topic:b.tema,topicShort:p.tema_abrev||b.tema.substring(0,2)}));});});}
  if(sim&&sim.parte_supuestos&&sim.parte_supuestos.supuestos){sim.parte_supuestos.supuestos.forEach(function(s,si){(s.preguntas||[]).forEach(function(p,pi){qs.push(Object.assign({},p,{section:"supuesto",topic:s.tema,supuestoNum:si+1,enunciado:s.enunciado,num:p.num||pi+1,topicShort:"S"+(si+1)}));});});}
  return qs;
}

function calcResults(questions,answers,pen){
  pen=pen||0.33;var correct=0,wrong=0,blank=0,byTopic={};
  questions.forEach(function(q,i){var key=q.section+"-"+q.topic;if(!byTopic[key])byTopic[key]={topic:q.topic,section:q.section,correct:0,wrong:0,blank:0,total:0};byTopic[key].total++;var ans=answers[i];if(!ans){blank++;byTopic[key].blank++;}else if(ans.toLowerCase()===(q.respuesta_correcta||"").toLowerCase()){correct++;byTopic[key].correct++;}else{wrong++;byTopic[key].wrong++;}});
  var raw=correct-wrong*pen,max=questions.length,pct=max>0?Math.max(0,(raw/max)*100):0;
  var topics=Object.values(byTopic).map(function(t){return Object.assign({},t,{raw:t.correct-t.wrong*pen,pct:t.total>0?Math.max(0,((t.correct-t.wrong*pen)/t.total)*100):0});});
  return{correct:correct,wrong:wrong,blank:blank,raw:Math.max(0,raw),max:max,pct:pct,topics:topics,pen:pen};
}

function ModeSelectScreen({simulacro,manifest,onChangeDate,onStart,history}){
  const qs=flattenQuestions(simulacro);
  const testCount=qs.filter(q=>q.section==="test").length;
  const supCount=qs.filter(q=>q.section==="supuesto").length;
  const topics=[...new Set(qs.filter(q=>q.section==="test").map(q=>q.topic))];
  const[mode,setMode]=useState(null);
  const[topic,setTopic]=useState(null);
  const modes=[
    {id:"real",icon:IC.clock,title:"Examen Real",desc:testCount+" test + "+supCount+" supuestos \u00b7 Cronometrado"},
    {id:"practice",icon:IC.book,title:"Pr\u00e1ctica libre",desc:"Sin cron\u00f3metro \u00b7 Ver respuestas tras responder"},
    {id:"topic",icon:IC.list,title:"Bloque tem\u00e1tico",desc:"Practica un solo tema"},
  ];
  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"32px 20px"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:36,color:C.header,margin:0,letterSpacing:-1}}>GACE Trainer</h1>
        <p style={{color:C.muted,fontSize:14,marginTop:6}}>Entrenamiento para oposiciones</p>
      </div>
      {manifest.length>0&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:28}}>
          <span style={{fontSize:14,fontWeight:600,color:C.textLight}}>Simulacro:</span>
          <select value={simulacro.simulacro_id||""} onChange={e=>onChangeDate(e.target.value)}
            style={{padding:"10px 16px",borderRadius:10,border:"2px solid "+C.accent,fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:700,color:C.accent,background:C.accentLight,cursor:"pointer"}}>
            {manifest.slice().reverse().map(s=>(<option key={s.id} value={s.id}>{formatDate(s.date)}</option>))}
          </select>
        </div>
      )}
      <div style={{background:C.card,borderRadius:16,padding:28,border:"1px solid "+C.border,marginBottom:20}}>
        <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:14,color:C.muted}}>{testCount} preguntas test + {supCount} supuestos</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {modes.map(m=>(
            <button key={m.id} onClick={()=>{setMode(m.id);if(m.id!=="topic")setTopic(null);}}
              style={{display:"flex",alignItems:"center",gap:16,padding:"18px 20px",background:mode===m.id?C.accentLight:C.card,border:"2px solid "+(mode===m.id?C.accent:C.border),borderRadius:14,cursor:"pointer",textAlign:"left"}}>
              <div style={{fontSize:24,color:mode===m.id?C.accent:C.muted}}>{m.icon}</div>
              <div><div style={{fontWeight:700,fontSize:16,color:C.header}}>{m.title}</div><div style={{fontSize:13,color:C.muted,marginTop:2}}>{m.desc}</div></div>
            </button>))}
        </div>
        {mode==="topic"&&(<div style={{marginTop:16}}><p style={{fontWeight:600,color:C.header,marginBottom:8,fontSize:14}}>Selecciona tema:</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{topics.map((t,i)=>(<button key={t} onClick={()=>setTopic(t)} style={{padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",border:"2px solid",borderColor:topic===t?TC[i]:C.border,background:topic===t?TC[i]+"18":C.card,color:topic===t?TC[i]:C.textLight}}>{t}</button>))}</div></div>)}
        {mode&&(mode!=="topic"||topic)&&(<button onClick={()=>onStart(mode,topic)} style={{width:"100%",marginTop:20,padding:"16px 24px",background:C.accent,color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:17,cursor:"pointer"}}>{IC.play} Empezar</button>)}
      </div>
      {history.length>0&&(<div style={{background:C.card,borderRadius:16,padding:24,border:"1px solid "+C.border}}>
        <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:18,margin:"0 0 12px 0"}}>Historial</h3>
        {history.slice(0,10).map((h,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:i<Math.min(history.length,10)-1?"1px solid "+C.border:"none"}}>
          <div><div style={{fontWeight:600,fontSize:14}}>{h.id}</div><div style={{color:C.muted,fontSize:12}}>{h.mode} \u00b7 {h.date}</div></div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:h.pct>=50?C.success:C.error}}>{h.pct.toFixed(1)}%</div></div>))}
      </div>)}
    </div>
  );
}

function ExamScreen({questions,mode,onFinish}){
  const[cur,setCur]=useState(0);const[answers,setAnswers]=useState({});const[marked,setMarked]=useState(new Set());
  const[showMap,setShowMap]=useState(false);const[confirmEnd,setConfirmEnd]=useState(false);
  const totalSec=mode==="real"?(90+120)*60:null;const[timeLeft,setTimeLeft]=useState(totalSec);const timerRef=useRef();
  useEffect(()=>{if(mode!=="real"||!timeLeft)return;timerRef.current=setInterval(()=>{setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);return 0;}return t-1;});},1000);return()=>clearInterval(timerRef.current);},[mode]);
  useEffect(()=>{if(timeLeft===0&&mode==="real")onFinish(answers);},[timeLeft]);
  const q=questions[cur],answered=Object.keys(answers).length,isMarked=marked.has(cur),isSupuesto=q&&q.section==="supuesto";
  const select=opt=>setAnswers(a=>Object.assign({},a,{[cur]:opt}));
  const toggleMark=()=>setMarked(m=>{const n=new Set(m);n.has(cur)?n.delete(cur):n.add(cur);return n;});
  const isPractice=mode==="practice"||mode==="topic",hasAnswered=answers[cur]!=null,showFeedback=isPractice&&hasAnswered;
  const correctOpt=(q.respuesta_correcta||"").toLowerCase(),userAns=(answers[cur]||"").toLowerCase(),isCorrect=userAns===correctOpt;
  const timerColor=timeLeft&&timeLeft<600?C.error:timeLeft&&timeLeft<1800?C.accent:"rgba(255,255,255,0.12)";
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{position:"sticky",top:0,zIndex:10,background:C.header,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{color:"#fff",fontWeight:700,fontSize:15}}>{cur+1}/{questions.length}</span><span style={{color:"rgba(255,255,255,0.5)",fontSize:13}}>{answered} resp.</span></div>
        {mode==="real"&&timeLeft!=null&&(<div style={{background:timerColor,padding:"5px 14px",borderRadius:8,color:"#fff",fontWeight:700,fontSize:16,fontVariantNumeric:"tabular-nums"}}>{IC.clock} {formatTime(timeLeft)}</div>)}
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowMap(!showMap)} style={{background:"rgba(255,255,255,0.12)",border:"none",color:"#fff",padding:"6px 12px",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>Mapa</button>
          <button onClick={()=>setConfirmEnd(true)} style={{background:C.accent,border:"none",color:"#fff",padding:"6px 14px",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:700}}>Finalizar</button>
        </div>
      </div>
      {showMap&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:20,display:"flex",justifyContent:"center",alignItems:"center"}} onClick={()=>setShowMap(false)}>
        <div style={{background:C.card,borderRadius:16,padding:24,maxWidth:420,width:"90%",maxHeight:"80vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
          <h3 style={{margin:"0 0 16px 0",fontFamily:"'DM Serif Display',serif",fontSize:20}}>Mapa de preguntas</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{questions.map((_,i)=>{const a=answers[i],m=marked.has(i);let bg=C.unanswered;if(a)bg=C.success;if(m)bg=C.marked;return(<button key={i} onClick={()=>{setCur(i);setShowMap(false);}} style={{width:36,height:36,borderRadius:8,border:i===cur?"2px solid "+C.header:"1px solid transparent",background:bg,color:a||m?"#fff":C.textLight,fontSize:12,fontWeight:700,cursor:"pointer"}}>{i+1}</button>);})}</div>
        </div></div>)}
      {confirmEnd&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:20,display:"flex",justifyContent:"center",alignItems:"center"}}>
        <div style={{background:C.card,borderRadius:16,padding:32,maxWidth:400,width:"90%",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>{IC.warn}</div><h3 style={{fontFamily:"'DM Serif Display',serif",margin:"0 0 8px 0",fontSize:22}}>{"\u00BF"}Finalizar examen?</h3>
          <p style={{color:C.muted,fontSize:14,marginBottom:8}}>Has respondido <strong>{answered}</strong> de <strong>{questions.length}</strong>.</p>
          {questions.length-answered>0&&(<p style={{color:C.error,fontSize:13,marginBottom:20}}>{questions.length-answered} sin responder</p>)}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setConfirmEnd(false)} style={{flex:1,padding:"12px 16px",background:C.bg,border:"1px solid "+C.border,borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer"}}>Seguir</button>
            <button onClick={()=>{clearInterval(timerRef.current);onFinish(answers);}} style={{flex:1,padding:"12px 16px",background:C.accent,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>Finalizar</button>
          </div></div></div>)}
      <div style={{maxWidth:740,margin:"0 auto",padding:"24px 16px 120px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <span style={{background:isSupuesto?C.markedLight:C.accentLight,color:isSupuesto?C.marked:C.accent,padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:700}}>{isSupuesto?"SUPUESTO "+q.supuestoNum:"TEST"}</span>
          <span style={{color:C.muted,fontSize:13,fontWeight:600}}>{q.topic}</span>
          <button onClick={toggleMark} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4,background:isMarked?C.markedLight:"transparent",border:"1px solid "+(isMarked?C.marked:C.border),color:isMarked?C.marked:C.muted,padding:"5px 10px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>{IC.flag} {isMarked?"Marcada":"Marcar"}</button>
        </div>
        {isSupuesto&&q.enunciado&&(<div style={{background:"#f0efeb",padding:20,borderRadius:12,marginBottom:20,fontSize:14,lineHeight:1.7,borderLeft:"4px solid "+C.marked}}><strong style={{display:"block",marginBottom:8,fontSize:13,color:C.marked}}>ENUNCIADO DEL CASO</strong>{q.enunciado}</div>)}
        <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:C.header,lineHeight:1.5,margin:"0 0 24px 0"}}><span style={{color:C.muted,fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600}}>Pregunta {cur+1}. </span>{q.pregunta}</h2>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {["a","b","c","d"].map(opt=>{const selected=userAns===opt;let bg=selected?C.accentLight:C.card,border=selected?C.accent:C.border,lBg=selected?C.accent:C.bg,lCol=selected?"#fff":C.muted;
            if(showFeedback){const isRight=correctOpt===opt;if(isRight){bg=C.successLight;border=C.success;lBg=C.success;lCol="#fff";}else if(selected&&!isCorrect){bg=C.errorLight;border=C.error;lBg=C.error;lCol="#fff";}else{bg=C.card;border=C.border;lBg=C.bg;lCol=C.muted;}}
            return(<button key={opt} onClick={()=>{if(!showFeedback)select(opt);}} style={{display:"flex",alignItems:"flex-start",gap:14,padding:"16px 18px",background:bg,border:"2px solid "+border,borderRadius:12,cursor:showFeedback?"default":"pointer",textAlign:"left"}}>
              <div style={{minWidth:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,background:lBg,color:lCol}}>{opt.toUpperCase()}</div>
              <div style={{fontSize:15,lineHeight:1.6,color:C.text,paddingTop:4}}>{q[opt]}</div></button>);})}
        </div>
        {showFeedback&&(<div style={{marginTop:20,background:C.card,borderRadius:14,padding:20,border:"1px solid "+C.border}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>{isCorrect?<span style={{fontWeight:700,color:C.success,fontSize:14}}>{IC.check} {"\u00A1"}Correcta!</span>:<span style={{fontWeight:700,color:C.error,fontSize:14}}>{IC.x} Incorrecta {"\u2014"} correcta: {correctOpt.toUpperCase()}</span>}</div>
          {q.explicacion&&(<p style={{fontSize:14,lineHeight:1.7,color:C.text,margin:"0 0 12px 0"}}>{q.explicacion}</p>)}
          {q.referencia_legal&&(<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#f0efeb",borderRadius:8}}><span style={{fontSize:13,fontWeight:700,color:C.accent}}>{IC.file} {q.referencia_legal}</span></div>)}
        </div>)}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:"1px solid "+C.border,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>setCur(Math.max(0,cur-1))} disabled={cur===0} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 18px",background:cur===0?C.bg:C.header,color:cur===0?C.muted:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:cur===0?"default":"pointer"}}>{IC.left} Anterior</button>
        <span style={{fontSize:13,color:C.muted,fontWeight:600}}>{cur+1} / {questions.length}</span>
        <button onClick={()=>setCur(Math.min(questions.length-1,cur+1))} disabled={cur===questions.length-1} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 18px",background:cur===questions.length-1?C.bg:C.header,color:cur===questions.length-1?C.muted:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:cur===questions.length-1?"default":"pointer"}}>Siguiente {IC.right}</button>
      </div>
    </div>);
}

function ResultsScreen({questions,answers,results,onReview,onHome}){
  const chartData=results.topics.map((t,i)=>({name:t.topic.length>14?t.topic.substring(0,12)+"\u2026":t.topic,fullName:t.topic,pct:Math.round(t.pct*10)/10,fill:TC[i%TC.length]}));
  const[filter,setFilter]=useState("all");
  const filtered=questions.map((q,i)=>({q,i})).filter(({q,i})=>{const a=answers[i];const correct=a&&a.toLowerCase()===(q.respuesta_correcta||"").toLowerCase();if(filter==="wrong")return a&&!correct;if(filter==="blank")return!a;return true;});
  return(
    <div style={{minHeight:"100vh",background:C.bg}}><div style={{maxWidth:740,margin:"0 auto",padding:"32px 16px"}}>
      <button onClick={onHome} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:C.muted,fontSize:14,cursor:"pointer",marginBottom:24,padding:0}}>{IC.back} Inicio</button>
      <div style={{background:results.pct>=50?"#ecfdf5":"#fef2f2",borderRadius:20,padding:36,textAlign:"center",marginBottom:24,border:"2px solid "+(results.pct>=50?"#a7f3d0":"#fecaca")}}>
        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:56,color:results.pct>=50?C.success:C.error,lineHeight:1}}>{results.pct.toFixed(1)}%</div>
        <div style={{color:C.muted,fontSize:14,marginTop:8}}>Puntuaci\u00f3n: {results.raw.toFixed(2)} / {results.max} (penalizaci\u00f3n \u2212{results.pen})</div>
        <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:20,flexWrap:"wrap"}}>
          <div><span style={{fontWeight:700,color:C.success}}>{IC.check} {results.correct}</span> <span style={{color:C.muted,fontSize:13}}>correctas</span></div>
          <div><span style={{fontWeight:700,color:C.error}}>{IC.x} {results.wrong}</span> <span style={{color:C.muted,fontSize:13}}>errores</span></div>
          <div><span style={{fontWeight:700,color:C.muted}}>{IC.minus} {results.blank}</span> <span style={{color:C.muted,fontSize:13}}>en blanco</span></div>
        </div></div>
      <div style={{background:C.card,borderRadius:16,padding:"24px 16px",border:"1px solid "+C.border,marginBottom:24}}>
        <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:18,margin:"0 0 16px 16px"}}>Rendimiento por tema</h3>
        <ResponsiveContainer width="100%" height={chartData.length*44+20}>
          <BarChart layout="vertical" data={chartData} margin={{left:8,right:24}}><XAxis type="number" domain={[0,100]} tickFormatter={v=>v+"%"} fontSize={12}/><YAxis type="category" dataKey="name" width={110} fontSize={12} tick={{fill:C.textLight}}/><Tooltip formatter={v=>v.toFixed(1)+"%"}/><Bar dataKey="pct" radius={[0,6,6,0]} barSize={22}>{chartData.map((d,i)=><Cell key={i} fill={d.fill}/>)}</Bar></BarChart>
        </ResponsiveContainer></div>
      <div style={{background:C.card,borderRadius:16,padding:24,border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:18,margin:0}}>Preguntas ({filtered.length})</h3>
          <div style={{display:"flex",gap:6}}>{[["all","Todas"],["wrong","Errores"],["blank","En blanco"]].map(([f,l])=>(<button key={f} onClick={()=>setFilter(f)} style={{padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:600,background:filter===f?C.header:C.bg,color:filter===f?"#fff":C.muted,border:"none",cursor:"pointer"}}>{l}</button>))}</div>
        </div>
        <div style={{maxHeight:400,overflow:"auto"}}>{filtered.map(({q,i})=>{const a=answers[i];const correct=a&&a.toLowerCase()===(q.respuesta_correcta||"").toLowerCase();const icon=!a?IC.minus:correct?IC.check:IC.x;const col=!a?C.muted:correct?C.success:C.error;
          return(<button key={i} onClick={()=>onReview(i)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",background:"transparent",border:"none",borderBottom:"1px solid "+C.border,cursor:"pointer",textAlign:"left"}}><span style={{color:col,fontWeight:700}}>{icon}</span><span style={{fontSize:13,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><strong>{i+1}.</strong> {q.pregunta}</span></button>);})}</div>
      </div></div></div>);
}

function ReviewScreen({question,index,answer,onBack}){
  const q=question,a=answer,correctOpt=(q.respuesta_correcta||"").toLowerCase(),isCorrect=a&&a.toLowerCase()===correctOpt;
  return(
    <div style={{minHeight:"100vh",background:C.bg}}><div style={{maxWidth:700,margin:"0 auto",padding:"32px 16px"}}>
      <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:C.muted,fontSize:14,cursor:"pointer",marginBottom:24,padding:0}}>{IC.back} Volver</button>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <span style={{background:q.section==="supuesto"?C.markedLight:C.accentLight,color:q.section==="supuesto"?C.marked:C.accent,padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:700}}>{q.section==="supuesto"?"SUPUESTO "+q.supuestoNum:"TEST"}</span>
        <span style={{color:C.muted,fontSize:13,fontWeight:600}}>{q.topic}</span>
        <span style={{marginLeft:"auto",color:!a?C.muted:isCorrect?C.success:C.error,fontWeight:700,fontSize:13}}>{!a?IC.minus+" En blanco":isCorrect?IC.check+" Correcta":IC.x+" Incorrecta"}</span>
      </div>
      {q.section==="supuesto"&&q.enunciado&&(<div style={{background:"#f0efeb",padding:20,borderRadius:12,marginBottom:20,fontSize:14,lineHeight:1.7,borderLeft:"4px solid "+C.marked}}><strong style={{display:"block",marginBottom:8,fontSize:13,color:C.marked}}>ENUNCIADO</strong>{q.enunciado}</div>)}
      <div style={{background:C.card,borderRadius:16,padding:28,border:"1px solid "+C.border,marginBottom:20}}>
        <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:20,lineHeight:1.5,margin:"0 0 24px 0"}}>Pregunta {index+1}. {q.pregunta}</h2>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {["a","b","c","d"].map(opt=>{const isThis=a&&a.toLowerCase()===opt,isRight=correctOpt===opt;let bg=C.bg,border=C.border,lBg=C.bg,lCol=C.muted;
            if(isRight){bg=C.successLight;border=C.success;lBg=C.success;lCol="#fff";}else if(isThis&&!isCorrect){bg=C.errorLight;border=C.error;lBg=C.error;lCol="#fff";}
            return(<div key={opt} style={{display:"flex",alignItems:"flex-start",gap:14,padding:"14px 16px",background:bg,border:"2px solid "+border,borderRadius:12}}>
              <div style={{minWidth:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,background:lBg,color:lCol}}>{opt.toUpperCase()}</div>
              <div style={{fontSize:14,lineHeight:1.6,paddingTop:3,color:C.text}}>{q[opt]}</div></div>);})}
        </div></div>
      <div style={{background:C.card,borderRadius:16,padding:24,border:"1px solid "+C.border}}>
        <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:16,margin:"0 0 12px 0"}}>Explicaci\u00f3n</h3>
        <p style={{fontSize:14,lineHeight:1.8,color:C.text,margin:"0 0 16px 0"}}>{q.explicacion||"Sin explicaci\u00f3n disponible."}</p>
        {q.referencia_legal&&(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"#f0efeb",borderRadius:10}}><span style={{fontSize:13,fontWeight:700,color:C.accent}}>{IC.file} {q.referencia_legal}</span></div>)}
      </div></div></div>);
}

function App(){
  const[view,setView]=useState("loading");const[manifest,setManifest]=useState([]);const[simulacro,setSimulacro]=useState(null);
  const[questions,setQuestions]=useState([]);const[examMode,setExamMode]=useState("real");const[answers,setAnswers]=useState({});
  const[results,setResults]=useState(null);const[reviewIdx,setReviewIdx]=useState(null);
  const[history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("gace-history")||"[]");}catch(e){return[];}});

  useEffect(()=>{
    fetch("data/manifest.json").then(r=>r.json()).then(m=>{setManifest(m);
      if(m.length>0){const latest=m[m.length-1];return fetch(latest.file).then(r=>r.json()).then(d=>{setSimulacro(d);setView("modeSelect");});}
      setView("modeSelect");}).catch(()=>setView("modeSelect"));
  },[]);

  const handleChangeDate=id=>{const entry=manifest.find(m=>m.id===id);if(!entry)return;setView("loading");
    fetch(entry.file).then(r=>r.json()).then(d=>{setSimulacro(d);setView("modeSelect");}).catch(()=>setView("modeSelect"));};
  const saveHistory=entry=>{const updated=[entry,...history].slice(0,50);setHistory(updated);try{localStorage.setItem("gace-history",JSON.stringify(updated));}catch(e){}};
  const handleStart=(mode,topic)=>{setExamMode(mode);let qs=flattenQuestions(simulacro);if(mode==="topic"&&topic)qs=qs.filter(q=>q.topic===topic);setQuestions(qs);setAnswers({});setResults(null);setView("exam");};
  const handleFinish=ans=>{setAnswers(ans);const r=calcResults(questions,ans,simulacro&&simulacro.penalizacion||0.33);setResults(r);
    saveHistory({id:simulacro&&simulacro.simulacro_id||"Simulacro",date:new Date().toLocaleDateString("es-ES"),mode:examMode==="real"?"Examen Real":examMode==="practice"?"Pr\u00e1ctica":"Bloque",pct:r.pct,correct:r.correct,wrong:r.wrong,blank:r.blank});setView("results");};
  const handleReview=idx=>{setReviewIdx(idx);setView("review");};

  return(<div style={{background:C.bg,minHeight:"100vh"}}>
    {view==="loading"&&(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:36,color:C.header,marginBottom:12}}>GACE Trainer</h1><p style={{color:C.muted,fontSize:15}}>Cargando simulacro...</p></div>)}
    {view==="modeSelect"&&simulacro&&<ModeSelectScreen simulacro={simulacro} manifest={manifest} onChangeDate={handleChangeDate} onStart={handleStart} history={history}/>}
    {view==="exam"&&<ExamScreen questions={questions} mode={examMode} onFinish={handleFinish}/>}
    {view==="results"&&<ResultsScreen questions={questions} answers={answers} results={results} onReview={handleReview} onHome={()=>setView("modeSelect")}/>}
    {view==="review"&&reviewIdx!=null&&<ReviewScreen question={questions[reviewIdx]} index={reviewIdx} answer={answers[reviewIdx]} onBack={()=>setView("results")}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
