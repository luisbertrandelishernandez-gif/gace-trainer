function App() {

  var s3=useState(null),simulacro=s3[0],setSimulacro=s3[1]; var s4=useState([]),questions=s4[0],setQuestions=s4[1];
  var s5=useState("real"),examMode=s5[0],setExamMode=s5[1]; var s6=useState({}),answers=s6[0],setAnswers=s6[1];
  var s7=useState(null),results=s7[0],setResults=s7[1]; var s8=useState(null),reviewIdx=s8[0],setReviewIdx=s8[1];
  var s9=useState(function(){try{return JSON.parse(localStorage.getItem("gace-history")||"[]")}catch(e){return[]}}),history=s9[0],setHistory=s9[1];

  useEffect(function(){

      if(m.length>0){var latest=m[m.length-1]; fetch(latest.file).then(function(r){return r.json()}).then(function(d){setSimulacro(d);setView("mode")}).catch(function(){setView("mode")});}

  function handleFinish(ans){setAnswers(ans);var r=calcRes(questions,ans,simulacro&&simulacro.penalizacion||0.33);setResults(r);saveHist({id:simulacro&&simulacro.simulacro_id||"Sim",date:new Date().toLocaleDateString("es-ES"),mode:examMode==="real"?"Examen Real":examMode==="practice"?"Pr\u00e1ctica":"Bloque",pct:r.pct,correct:r.c,wrong:r.w,blank:r.b});setView("results");}

}
